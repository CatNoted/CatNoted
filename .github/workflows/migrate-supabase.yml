name: Migrate Supabase Schema

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      MIGRATION_SQL_PATH: supabase/migrations/20260724000000_init_schema.sql
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure Supabase DB URL for GHA Pooler Routing
        run: |
          # Replace port 5432 with 6543
          POOLED_URL=$(echo "${{ secrets.SUPABASE_DB_URL }}" | sed -e 's/:5432/:6543/')
          echo "SUPABASE_DB_URL=$POOLED_URL" >> $GITHUB_ENV
      - run: npm install pg@8.11.3 --no-audit --no-fund --silent
      - run: node .github/scripts/migrate.cjs
