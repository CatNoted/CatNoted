name: Migrate Supabase Schema

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      MIGRATION_SQL_PATH: supabase/migrations/20260724000000_init_schema.sql
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Route Supabase Direct Host to Pooler IPv4
        run: |
          POOLER_IP=$(dig +short aws-0-ap-southeast-1.pooler.supabase.com | grep -E '^[0-9.]+$' | head -n 1)
          if [ -z "$POOLER_IP" ]; then POOLER_IP="52.77.146.31"; fi
          echo "Routing db.vhuchnycqhprthmdsont.supabase.co to IPv4 Pooler: $POOLER_IP"
          echo "$POOLER_IP db.vhuchnycqhprthmdsont.supabase.co" | sudo tee -a /etc/hosts
      - run: npm install pg@8.11.3 --no-audit --no-fund --silent
      - run: node .github/scripts/migrate.cjs
